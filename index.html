<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="img/calculator.png">
    <script src="main.js" defer></script>
</head>
<body>
    <div class="main">
    <div class="calculator">
        <div class="output">
            <div class="previous-operand"></div>
            <div class="current-operand">0</div>
        </div>
        <div class="buttons">
            <div class="clear">AC</div>
            <div class="delete">DEL</div>
            <div class="btn-operator">×</div>
            <div class="btn-operator">÷</div>
            <div class="btn-num">7</div>
            <div class="btn-num">8</div>
            <div class="btn-num">9</div>
            <div class="btn-operator">-</div>
            <div class="btn-num">4</div>
            <div class="btn-num">5</div>
            <div class="btn-num">6</div>
            <div class="btn-operator">+</div>
            <div class="btn-num">1</div>
            <div class="btn-num">2</div>
            <div class="btn-num">3</div>
            <div class="equal">=</div>
            <div class="btn-num zero">0</div>
            <div class="decimal">.</div>
        </div>
    </div>
    <footer class="footer">
        <p>
          Copyright ©
          <script>
            document.write(new Date().getFullYear())
          </script>
          fairusinampratama
        </p>
        <a class = fa-github href="https://github.com/fairusinampratama"><img src="img/github-yellow.svg"></a>
    </footer>
    </div>
</body>
</html>
